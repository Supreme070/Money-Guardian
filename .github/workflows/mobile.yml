name: Mobile CI

on:
  push:
    branches: [main]
    paths: ['mobile/**']
  pull_request:
    branches: [main]
    paths: ['mobile/**']

env:
  FLUTTER_VERSION: '3.32.x'

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed lib/
      - run: flutter analyze --no-fatal-infos

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter test --coverage
      - name: Check coverage
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "Coverage report generated"
          else
            echo "No coverage data — add tests"
          fi

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build appbundle --release --dart-define=ENV=staging --obfuscate --split-debug-info=build/debug-info
      - uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.sha }}
          path: mobile/build/app/outputs/bundle/release/*.aab
          retention-days: 14

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign --dart-define=ENV=staging --obfuscate --split-debug-info=build/debug-info
