name: Mobile CI

on:
  push:
    branches: [main]
    paths: ['mobile/**']
  pull_request:
    branches: [main]
    paths: ['mobile/**']

env:
  FLUTTER_VERSION: '3.32.x'

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed lib/
      - run: flutter analyze --no-fatal-infos

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter test --coverage
      - name: Enforce coverage threshold (60%)
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "ERROR: No coverage data generated. Add tests."
            exit 1
          fi
          sudo apt-get install -y lcov > /dev/null 2>&1
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep -oP 'lines\.*:\s*\K[\d.]+')
          echo "Line coverage: ${COVERAGE}%"
          THRESHOLD=60
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "FAIL: Coverage ${COVERAGE}% is below ${THRESHOLD}% threshold"
            exit 1
          fi
          echo "PASS: Coverage ${COVERAGE}% meets ${THRESHOLD}% threshold"

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build appbundle --release --dart-define=ENV=staging --obfuscate --split-debug-info=build/debug-info
      - uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.sha }}
          path: mobile/build/app/outputs/bundle/release/*.aab
          retention-days: 30

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get

      # Fastlane Match for code signing (requires secrets to be configured)
      - name: Install Fastlane
        if: env.MATCH_PASSWORD != ''
        run: gem install fastlane
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Setup code signing
        if: env.MATCH_PASSWORD != ''
        run: cd ios && fastlane match appstore --readonly
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_AUTH }}

      # Build with signing if certs available, without if not
      - name: Build iOS (signed)
        if: env.MATCH_PASSWORD != ''
        run: flutter build ios --release --dart-define=ENV=staging --obfuscate --split-debug-info=build/debug-info
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Build iOS (unsigned - CI verification only)
        if: env.MATCH_PASSWORD == ''
        run: flutter build ios --release --no-codesign --dart-define=ENV=staging --obfuscate --split-debug-info=build/debug-info
